<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stateful PDF Chat</title>
  <meta name="description" content="Stateful PDF Chat" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background-color: #ffffff;
      color: #333333;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar - plain gray border sidebar */
    .sidebar {
      width: 240px;
      background-color: #f5f5f5;
      border-right: 1px solid #cccccc;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .sidebar-header {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #cccccc;
    }

    .sidebar-new-chat-btn {
      width: 100%;
      padding: 6px;
      margin-bottom: 12px;
      cursor: pointer;
      background-color: #ffffff;
      border: 1px solid #999999;
      font-size: 13px;
    }

    .sidebar-new-chat-btn:hover {
      background-color: #e6e6e6;
    }

    .sidebar-sessions {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .session-item {
      padding: 8px;
      border: 1px solid #cccccc;
      background-color: #ffffff;
      cursor: pointer;
    }

    .session-item:hover {
      background-color: #f0f0f0;
    }

    .session-item.active {
      background-color: #e2e2e2;
      border-color: #666666;
      font-weight: bold;
    }

    .session-item-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item-date {
      font-size: 11px;
      color: #666666;
      margin-top: 2px;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: #ffffff;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #cccccc;
      background-color: #fcfcfc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 16px;
      font-weight: bold;
    }

    .header-subtitle {
      font-size: 12px;
      color: #666666;
      display: inline-block;
      margin-left: 8px;
    }

    .session-indicator {
      font-family: monospace;
      font-size: 12px;
      color: #333333;
      border: 1px solid #cccccc;
      background-color: #eeeeee;
      padding: 2px 6px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Empty state */
    .empty-state {
      padding: 30px;
      text-align: center;
      border: 1px dashed #999999;
      margin: auto;
      max-width: 500px;
      background-color: #fafafa;
    }

    .empty-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 13px;
      color: #555555;
      margin-bottom: 16px;
    }

    .suggestion-chips {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .chip {
      padding: 6px 12px;
      background: #ffffff;
      border: 1px solid #999999;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      max-width: 350px;
      text-align: left;
    }

    .chip:hover {
      background: #e6e6e6;
    }

    /* Message lines */
    .message {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .avatar {
      font-weight: bold;
      font-size: 15px;
      padding-top: 2px;
      width: 24px;
      text-align: center;
    }

    .bubble {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #cccccc;
    }

    .bubble-user {
      background-color: #f4f8ff;
    }

    .bubble-assistant {
      background-color: #ffffff;
    }

    /* Markdown inside messages */
    .bubble-assistant h1,
    .bubble-assistant h2,
    .bubble-assistant h3 {
      font-size: 13px;
      font-weight: bold;
      margin: 8px 0 4px;
    }

    .bubble-assistant p {
      margin-bottom: 6px;
    }

    .bubble-assistant p:last-child {
      margin-bottom: 0;
    }

    .bubble-assistant ul,
    .bubble-assistant ol {
      margin: 4px 0 4px 18px;
    }

    .bubble-assistant code {
      font-family: monospace;
      font-size: 12px;
      background: #f0f0f0;
      padding: 0px 4px;
    }

    .bubble-assistant pre {
      background: #fafafa;
      border: 1px solid #cccccc;
      padding: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble-assistant table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .bubble-assistant th,
    .bubble-assistant td {
      border: 1px solid #cccccc;
      padding: 4px 8px;
      text-align: left;
      font-size: 12px;
    }

    .bubble-assistant th {
      background-color: #f0f0f0;
    }

    .sources {
      margin-top: 8px;
      font-size: 11px;
      color: #555555;
      border-top: 1px solid #eeeeee;
      padding-top: 6px;
    }

    .source-badge {
      display: inline-block;
      background: #f0f0f0;
      border: 1px solid #cccccc;
      padding: 1px 4px;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .typing-bubble {
      padding: 8px 12px;
      border: 1px solid #cccccc;
      background-color: #ffffff;
      font-size: 12px;
      color: #666666;
    }

    /* Form and Input Area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #cccccc;
      background-color: #fcfcfc;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      margin-bottom: 6px;
      color: #555555;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #999999;
      display: inline-block;
    }

    .status-dot.online {
      background-color: #008800;
    }

    .status-dot.loading {
      background-color: #dd8800;
    }

    .status-dot.error {
      background-color: #cc0000;
    }

    .input-form {
      display: flex;
      gap: 8px;
    }

    .input-wrapper {
      flex: 1;
    }

    #message-input {
      width: 100%;
      padding: 6px;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #999999;
      resize: vertical;
      min-height: 36px;
    }

    #send-btn {
      padding: 0 12px;
      background-color: #ffffff;
      border: 1px solid #999999;
      cursor: pointer;
      font-size: 13px;
    }

    #send-btn:hover:not(:disabled) {
      background-color: #eeeeee;
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: 11px;
      color: #777777;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #cccccc;
      }

      .chat-area {
        height: 0;
        flex: 1;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        Research Chats
      </div>
      <button onclick="newChat()" class="sidebar-new-chat-btn">+ New Chat</button>
      <div class="sidebar-sessions" id="sidebar-sessions">
        <!-- Session items populated dynamically -->
      </div>
    </aside>

    <!-- Chat Area  -->
    <div class="chat-area">

      <!-- Header -->
      <header class="header">
        <div>
          <span class="header-title">Stateful PDF Chat</span>
          <span class="header-subtitle">(Temporal · Qdrant · LangSmith)</span>
        </div>
        <div id="session-display" class="session-indicator" title="Session ID">No session</div>
      </header>

      <!-- Messages -->
      <main class="messages" id="messages-container" role="log" aria-live="polite">
        <div class="empty-state" id="empty-state">
          <div class="empty-title">Ask questions about your papers</div>
          <div class="empty-desc">
            Your session is durable. If the server restarts, your conversation history is preserved by Temporal.
          </div>
          <div class="suggestion-chips">
            <button class="chip" id="chip-1" onclick="sendChip(this)">What is the main contribution?</button>
            <button class="chip" id="chip-2" onclick="sendChip(this)">Summarise the methodology</button>
            <button class="chip" id="chip-3" onclick="sendChip(this)">What are the key results?</button>
            <button class="chip" id="chip-4" onclick="sendChip(this)">List the limitations discussed</button>
          </div>
        </div>
      </main>

      <!-- Input area -->
      <footer class="input-area">
        <div class="status-bar">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Connecting…</span>
        </div>
        <form class="input-form" id="chat-form" onsubmit="handleSubmit(event)">
          <div class="input-wrapper">
            <textarea id="message-input" placeholder="Ask a question about the papers…" rows="1" disabled
              aria-label="Message input"></textarea>
          </div>
          <button type="submit" id="send-btn" disabled>Send</button>
        </form>
        <div class="input-hint">Enter to send · Shift+Enter for newline</div>
      </footer>
    </div>

  </div>

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <script>
    // State
    let sessionId = null;
    let isLoading = false;

    const messagesEl = document.getElementById('messages-container');
    const emptyState = document.getElementById('empty-state');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const sessionDisp = document.getElementById('session-display');

    // Marked config
    marked.setOptions({ breaks: true, gfm: true });

    // Utilities
    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function setReady(ready) {
      inputEl.disabled = !ready;
      sendBtn.disabled = !ready;
      if (ready) inputEl.focus();
    }

    function scrollToBottom() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    }

    function hideEmpty() {
      if (emptyState) emptyState.style.display = 'none';
    }

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) handleSubmit(e);
      }
    });

    // Session init
    async function initSession() {
      const urlParams = new URLSearchParams(window.location.search);
      let existingSessionId = urlParams.get('session_id') || localStorage.getItem('stateful_pdf_chat_session_id');

      if (existingSessionId) {
        setStatus('loading', 'Resuming session…');
        try {
          const res = await fetch(`/chat/${existingSessionId}/history`);
          if (res.ok) {
            const data = await res.json();
            sessionId = data.session_id;

            localStorage.setItem('stateful_pdf_chat_session_id', sessionId);
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?session_id=' + sessionId;
            window.history.replaceState({ path: newUrl }, '', newUrl);

            sessionDisp.textContent = sessionId.slice(0, 8) + '…';
            sessionDisp.title = 'Session: ' + sessionId;

            if (data.history && data.history.length > 0) {
              hideEmpty();
              data.history.forEach(turn => {
                appendMessage(turn.role, turn.content, turn.sources || []);
              });
            }

            setStatus('online', 'Session ready · Temporal workflow running');
            setReady(true);
            await loadPreviousSessions();
            return;
          }
        } catch (err) {
          console.warn('Could not resume session, starting a new one:', err);
        }
      }

      setStatus('loading', 'Starting new session…');
      try {
        const res = await fetch('/chat/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: 'Research Session' }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        sessionId = data.session_id;

        localStorage.setItem('stateful_pdf_chat_session_id', sessionId);
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?session_id=' + sessionId;
        window.history.replaceState({ path: newUrl }, '', newUrl);

        sessionDisp.textContent = sessionId.slice(0, 8) + '…';
        sessionDisp.title = 'Session: ' + sessionId;
        setStatus('online', 'Session ready · Temporal workflow running');
        setReady(true);
        await loadPreviousSessions();
      } catch (err) {
        setStatus('error', 'Failed to start session: ' + err.message);
        console.error(err);
      }
    }

    async function newChat() {
      if (isLoading) return;
      localStorage.removeItem('stateful_pdf_chat_session_id');
      const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
      window.history.replaceState({ path: newUrl }, '', newUrl);

      const messages = messagesEl.querySelectorAll('.message');
      messages.forEach(m => m.remove());
      if (emptyState) emptyState.style.display = 'block';

      await initSession();
    }

    // Load previous sessions
    async function loadPreviousSessions() {
      try {
        const res = await fetch('/chats');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const container = document.getElementById('sidebar-sessions');
        if (!container) return;
        container.innerHTML = '';

        if (data.sessions && data.sessions.length > 0) {
          data.sessions.forEach(sess => {
            const item = document.createElement('div');
            item.className = 'session-item' + (sess.session_id === sessionId ? ' active' : '');
            item.onclick = () => switchSession(sess.session_id);

            const date = new Date(sess.start_time).toLocaleString(undefined, {
              month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            item.innerHTML = `
            <div class="session-item-title">${escapeHtml(sess.title)}</div>
            <div class="session-item-date">${date}</div>
          `;
            container.appendChild(item);
          });
        } else {
          container.innerHTML = '<div style="font-size:12px; color:#666666; text-align:center; padding:20px;">No chats yet</div>';
        }
      } catch (err) {
        console.error('Error loading chats:', err);
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    async function switchSession(newSessionId) {
      if (isLoading || newSessionId === sessionId) return;

      const messages = messagesEl.querySelectorAll('.message');
      messages.forEach(m => m.remove());
      if (emptyState) emptyState.style.display = 'none';

      localStorage.setItem('stateful_pdf_chat_session_id', newSessionId);

      await initSession();
    }

    // Render a message bubble
    function appendMessage(role, content, sources = []) {
      hideEmpty();

      const isUser = role === 'user';
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar avatar-' + role;
      avatar.textContent = isUser ? '👤' : '🤖';

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble bubble-' + role;

      if (isUser) {
        bubbleEl.textContent = content;
      } else {
        bubbleEl.innerHTML = marked.parse(content);
      }

      if (!isUser && sources.length > 0) {
        const sourcesEl = document.createElement('div');
        sourcesEl.className = 'sources';
        sources.forEach(src => {
          const badge = document.createElement('span');
          badge.className = 'source-badge';
          badge.textContent = '📄 ' + src;
          badge.title = src;
          sourcesEl.appendChild(badge);
        });
        bubbleEl.appendChild(sourcesEl);
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubbleEl);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    // Typing indicator
    let typingEl = null;

    function showTyping() {
      if (typingEl) return;
      typingEl = document.createElement('div');
      typingEl.className = 'typing';
      typingEl.innerHTML = `
      <div class="avatar avatar-assistant">🤖</div>
      <div class="typing-bubble">
        Thinking...
      </div>`;
      messagesEl.appendChild(typingEl);
      scrollToBottom();
    }

    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    // Send a message
    async function sendMessage(text) {
      if (!text.trim() || !sessionId || isLoading) return;
      isLoading = true;
      setReady(false);

      appendMessage('user', text);
      showTyping();
      setStatus('loading', 'Searching papers and generating answer…');

      try {
        const res = await fetch(`/chat/${sessionId}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        hideTyping();
        appendMessage('assistant', data.answer, data.sources || []);
        setStatus('online', 'Session ready · Temporal workflow running');
        await loadPreviousSessions();
      } catch (err) {
        hideTyping();
        appendMessage('assistant', `⚠️ **Error:** ${err.message}\n\nCheck that the worker is running and papers are ingested.`, []);
        setStatus('error', 'Error: ' + err.message);
      } finally {
        isLoading = false;
        setReady(true);
        inputEl.style.height = 'auto';
      }
    }

    function handleSubmit(e) {
      if (e && e.preventDefault) e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendMessage(text);
    }

    // chip list trigger
    function sendChip(btn) {
      if (!sessionId || isLoading) return;
      sendMessage(btn.textContent.trim());
    }

    // Boot
    initSession();
  </script>

</body>

</html>
